# ============================================================
# GameVault — Spring Boot Configuration
# ============================================================
spring.application.name=games-catalog
server.port=8080

# ============================================================
# DATABASE — H2 In-Memory (local development)
# Use this when running locally without Docker/RDS.
# The H2 Console is accessible at http://localhost:8080/h2-console
# ============================================================
#spring.datasource.url=jdbc:h2:mem:gamesdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
#spring.datasource.driver-class-name=org.h2.Driver
#spring.datasource.username=sa
#spring.datasource.password=
#spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
#spring.h2.console.enabled=true
#spring.h2.console.path=/h2-console

# ============================================================
# DATABASE — Amazon RDS / MySQL (AWS production)
# Uncomment this block and comment the H2 block above
# when deploying to AWS ECS/EC2 with RDS in a private subnet.
# Set DB_HOST, DB_USER, DB_PASSWORD as environment variables
# in your ECS Task Definition or EC2 instance.
# ============================================================
# spring.datasource.url=jdbc:mysql://${DB_HOST}:3306/gamesdb?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
# spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# spring.datasource.username=${DB_USER}
# spring.datasource.password=${DB_PASSWORD}
# spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ============================================================
# DATABASE — PostgreSQL / Aurora Serverless (alternative)
# ============================================================
 spring.datasource.url=jdbc:postgresql://${DB_HOST}:5432/gamesdb
 spring.datasource.driver-class-name=org.postgresql.Driver
 spring.datasource.username=${DB_USER}
 spring.datasource.password=${DB_PASSWORD}
 spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# ============================================================
# JPA / Hibernate
# ============================================================
# update: creates/alters tables automatically — good for dev
# validate: only validates schema — use in production with Flyway/Liquibase
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ============================================================
# Jackson — JSON serialization
# ============================================================
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=non_null

# ============================================================
# Server error handling
# ============================================================
server.error.include-message=always
server.error.include-binding-errors=always
